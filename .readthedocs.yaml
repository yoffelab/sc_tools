# ReadTheDocs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

# Install the package and its docs dependencies
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# Path to Sphinx conf.py
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

# Do not execute notebooks during RTD builds (static outputs only)
# nb_execution_mode = "off" is set in conf.py
