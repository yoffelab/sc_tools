name: sc_tools
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  # Core scientific
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - statsmodels
  # Visualization and statistics
  - matplotlib
  - seaborn
  # Utilities
  - tqdm
  - dask
  - pillow
  - tifffile
  # HDF5 support (for AnnData/h5py)
  - h5py
  - hdf5
  - pip
  - pip:
    # Single-cell / spatial stack
    - scanpy
    - squidpy
    - anndata
    # Statistical annotation for figures
    - statannotations>=0.6
    - pingouin>=0.5
    # Deconvolution (heavy GPU-optional deps; comment out if not needed locally)
    - scvi-tools
    - tangram-sc
    # sc_tools package (editable install from repo root)
    - -e .
