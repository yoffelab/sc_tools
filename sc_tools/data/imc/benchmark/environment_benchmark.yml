# Conda environment for IMC segmentation benchmark on HPC
# Usage: conda env create -f environment_benchmark.yml
# Activate: conda activate sc_tools_benchmark
name: sc_tools_benchmark
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip>=23.0

  # PyTorch + CUDA
  - pytorch>=2.0
  - torchvision>=0.15
  - pytorch-cuda=12.1

  # Core scientific
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - scikit-image>=0.21
  - matplotlib>=3.7
  - seaborn>=0.12

  # Single-cell
  - scanpy>=1.9
  - anndata>=0.10

  # Image I/O
  - tifffile>=2023.1
  - pillow>=10.0

  # pip-only packages
  - pip:
    - cellpose>=3.0,<4.0
    - stardist>=0.9
    - deepcell>=0.12
    - transformers>=4.30
    - segmentation-models-pytorch>=0.3
    - albumentations>=1.3
    - plotly>=5.18
    - jinja2>=3.0
    - pyyaml>=6.0
    - tqdm>=4.65
    - sc-tools  # or: -e /path/to/sc_tools
